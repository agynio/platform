version: v2beta1

vars:
  PLATFORM_NAMESPACE: platform

pipelines:
  dev: |-
    create_deployments --sequential argocd-sync-off platform-server
    start_dev platform-server

deployments:
  argocd-sync-off:
    namespace: argocd
    kubectl:
      manifests:
        - devspace/argocd-sync-off
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    helm:
      releaseName: platform-server
      chart:
        path: ../../charts/platform-server
      values:
        image:
          repository: ghcr.io/agynio/platform-server
          tag: dev
          pullPolicy: IfNotPresent
        securityContext:
          enabled: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 500m
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 128Mi

hooks:
  - name: wait-for-argocd-sync-off
    command: kubectl
    args:
      - wait
      - --namespace
      - argocd
      - --for=condition=complete
      - --timeout=120s
      - job/argocd-sync-off
    events:
      - after:deploy:argocd-sync-off

dev:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: platform-server
      app.kubernetes.io/instance: platform-server
    containers:
      platform-server:
        container: platform-server
        workingDir: /opt/app/data/workspace
        command:
          - bash
        args:
          - -c
          - |
            set -euo pipefail
            cd /opt/app/data/workspace
            corepack pnpm install
            corepack pnpm --filter @agyn/platform-server dev
        sync:
          - path: ../..:/opt/app/data/workspace
            excludePaths:
              - node_modules
              - dist
              - .git
              - packages/platform-server/node_modules
              - packages/platform-server/dist
