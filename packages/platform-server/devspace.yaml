version: v2beta1

vars:
  PLATFORM_NAMESPACE: platform

pipelines:
  dev: |-
    if kubectl get application platform-server -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for platform-server..."
      kubectl patch application platform-server -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'platform-server' not found in argocd namespace."
    fi
    start_dev platform-server

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:platform-server
    command: sh
    args:
      - -c
      - |
        if kubectl get application platform-server -n argocd >/dev/null 2>&1; then
          echo "Re-enabling ArgoCD auto-sync for platform-server..."
          kubectl patch application platform-server -n argocd \
            --type merge \
            -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
          echo "ArgoCD auto-sync restored."
        fi

dev:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: platform-server
      app.kubernetes.io/instance: platform-server
    patches:
      - op: replace
        path: spec.containers.name=platform-server.securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
      - op: replace
        path: spec.securityContext
        value:
          runAsUser: 1000
          fsGroup: 1000
      - op: remove
        path: spec.initContainers
      - op: replace
        path: spec.containers.name=platform-server.resources
        value:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
    containers:
      platform-server:
        container: platform-server
        devImage: ghcr.io/agynio/platform-server:dev
        workingDir: /opt/app/data
        command:
          - sh
          - -c
          - |
            set -eu

            echo "=== DevSpace startup ==="
            echo "Waiting for file sync..."

            elapsed=0
            while [ ! -f /opt/app/data/pnpm-workspace.yaml ]; do
              sleep 1
              elapsed=$((elapsed + 1))
              if [ "$elapsed" -ge 120 ]; then
                echo "ERROR: pnpm-workspace.yaml not found after 120s" >&2
                exit 1
              fi
            done
            echo "Sync ready (${elapsed}s)."

            echo "Bootstrapping pnpm..."
            mkdir -p /opt/app/data/corepack
            corepack enable --install-directory /opt/app/data/corepack
            export PATH="/opt/app/data/corepack:$PATH"
            corepack prepare pnpm@10.5.0 --activate

            if ! command -v buf >/dev/null 2>&1; then
              echo "Installing buf..."
              node -e "const https=require('https');const fs=require('fs');const dest='/opt/app/data/corepack/buf';const download=(url)=>new Promise((resolve,reject)=>{https.get(url,res=>{if(res.statusCode&&res.statusCode>=300&&res.statusCode<400&&res.headers.location){res.resume();return resolve(download(res.headers.location));}if(res.statusCode!==200){return reject(new Error('Failed to download buf: '+res.statusCode));}const file=fs.createWriteStream(dest);res.pipe(file);file.on('finish',()=>file.close(resolve));file.on('error',reject);}).on('error',reject);});download('https://github.com/bufbuild/buf/releases/download/v1.45.0/buf-Linux-x86_64').then(()=>{fs.chmodSync(dest,0o755);}).catch(err=>{console.error(err.message);process.exit(1);});"
            fi

            export SSL_CERT_FILE="/opt/app/data/corepack/cacert.pem"
            if [ ! -f "$SSL_CERT_FILE" ]; then
              echo "Installing CA bundle..."
              node -e "const https=require('https');const fs=require('fs');const dest='/opt/app/data/corepack/cacert.pem';const download=(url)=>new Promise((resolve,reject)=>{https.get(url,res=>{if(res.statusCode&&res.statusCode>=300&&res.statusCode<400&&res.headers.location){res.resume();return resolve(download(res.headers.location));}if(res.statusCode!==200){return reject(new Error('Failed to download CA bundle: '+res.statusCode));}const file=fs.createWriteStream(dest);res.pipe(file);file.on('finish',()=>file.close(resolve));file.on('error',reject);}).on('error',reject);});download('https://curl.se/ca/cacert.pem').then(()=>{fs.chmodSync(dest,0o644);}).catch(err=>{console.error(err.message);process.exit(1);});"
            fi

            cd /opt/app/data

            echo "Generating protobuf types..."
            pnpm proto:generate

            echo "Approving build scripts..."
            pnpm approve-builds @prisma/client prisma esbuild @nestjs/core

            echo "Installing dependencies..."
            pnpm install --filter @agyn/platform-server... --frozen-lockfile

            echo "Generating Prisma client..."
            pnpm --filter @agyn/platform-server run prisma:generate

            echo "Starting dev server (tsx watch)..."
            pnpm --filter @agyn/platform-server dev
        env:
          - name: NODE_ENV
            value: development
          - name: GRAPH_REPO_PATH
            value: /opt/app/data/graph
        sync:
          - path: ../..:/opt/app/data
            excludePaths:
              - .git/
              - node_modules/
              - dist/
              - .devspace/
              - .pnpm-store/
              - packages/platform-server/prisma/generated/
              - packages/platform-server/data/
              - "packages/**/src/proto/gen/"
            uploadExcludePaths:
              - .git/
              - node_modules/
              - dist/
              - .pnpm-store/
              - packages/platform-server/prisma/generated/
              - "packages/**/src/proto/gen/"
            downloadExcludePaths:
              - .git/
              - node_modules/
              - dist/
              - .pnpm-store/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "3010"
