version: v2beta1

vars:
  PLATFORM_NAMESPACE: platform

pipelines:
  dev: |-
    if kubectl get application platform-server -n argocd >/dev/null 2>&1; then
      kubectl patch application platform-server -n argocd --type merge -p '{"spec":{"syncPolicy":{"automated":null}}}'
    fi
    kubectl set resources deployment platform-server -n ${PLATFORM_NAMESPACE} --containers=platform-server --limits=cpu=2000m,memory=4Gi --requests=cpu=500m,memory=2Gi
    start_dev platform-server

hooks:
  - name: enable-argocd-auto-sync
    command: sh
    args:
      - -lc
      - |
        set -eu
        if kubectl get application platform-server -n argocd >/dev/null 2>&1; then
          kubectl patch application platform-server -n argocd --type merge -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
        fi
    events:
      - after:dev:platform-server

dev:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    container: platform-server
    labelSelector:
      app.kubernetes.io/name: platform-server
    patches:
      - op: replace
        path: spec.template.spec.securityContext
        value:
          runAsUser: 1000
          fsGroup: 1000
      - op: replace
        path: spec.template.spec.containers[0].resources.limits.cpu
        value: "2000m"
      - op: replace
        path: spec.template.spec.containers[0].resources.limits.memory
        value: "4Gi"
      - op: replace
        path: spec.template.spec.containers[0].resources.requests.cpu
        value: "500m"
      - op: replace
        path: spec.template.spec.containers[0].resources.requests.memory
        value: "2Gi"
    containers:
      platform-server:
        devImage: ghcr.io/agynio/platform-server:dev
        command:
          - sh
          - -lc
          - |
            set -eu
            workspace_dir=/opt/app/data/workspace
            mkdir -p /tmp/devspace-bin
            if [ ! -x /tmp/devspace-bin/corepack ]; then
              cp /usr/local/bin/corepack /tmp/devspace-bin/corepack
              if [ -d /usr/local/lib/node_modules/corepack/dist/lib ]; then
                mkdir -p /tmp/devspace-bin/lib
                cp -R /usr/local/lib/node_modules/corepack/dist/lib/* /tmp/devspace-bin/lib/
              fi
            fi
            export PATH="/tmp/devspace-bin:${PATH}"
            for _ in $(seq 1 120); do
              if [ -f "${workspace_dir}/packages/platform-server/package.json" ]; then
                break
              fi
              sleep 1
            done
            if [ ! -f "${workspace_dir}/packages/platform-server/package.json" ]; then
              echo "workspace packages not available after waiting" 1>&2
              exit 1
            fi
            sandbox_home="${workspace_dir}/home"
            unset HOME || true
            export HOME="${sandbox_home}"
            export NPM_CONFIG_CACHE="${sandbox_home}/.npm"
            export PNPM_HOME="${sandbox_home}/.pnpm"
            export TMPDIR="${sandbox_home}/tmp"
            mkdir -p "${sandbox_home}/.npm" "${PNPM_HOME}" "${TMPDIR}"
            chown -R 1000:1000 "${sandbox_home}" || true
            if [ ! -f "${workspace_dir}/package.json" ] && [ -f /opt/app/package.json ]; then
              cp /opt/app/package.json "${workspace_dir}/package.json"
            fi
            if [ ! -f "${workspace_dir}/package.json" ]; then
              printf '%s\n' '{' \
                '  "name": "agyn",' \
                '  "version": "1.0.0",' \
                '  "private": true,' \
                '  "packageManager": "pnpm@10.5.0"' \
                '}' > "${workspace_dir}/package.json"
            fi
            if [ ! -f "${workspace_dir}/pnpm-workspace.yaml" ]; then
              printf '%s\n' "packages:" "  - 'packages/*'" "  - 'packages/**'" > "${workspace_dir}/pnpm-workspace.yaml"
            fi
            cd "${workspace_dir}"
            env HOME="${sandbox_home}" \
              NPM_CONFIG_CACHE="${NPM_CONFIG_CACHE}" \
              PNPM_HOME="${PNPM_HOME}" \
              TMPDIR="${TMPDIR}" \
              sh -eu -c 'corepack enable && corepack pnpm install && corepack pnpm --filter @agyn/platform-server dev'
        sync:
          - path: ../..:/opt/app/data/workspace
            excludePaths:
              - '.git/'
              - 'node_modules/'
              - '.pnpm-store/'
              - 'devspace-dev.log'
            uploadExcludePaths:
              - '.git/'
              - 'node_modules/'
              - '.pnpm-store/'
              - 'devspace-dev.log'
            downloadExcludePaths:
              - '.git/'
              - 'node_modules/'
              - '.pnpm-store/'
