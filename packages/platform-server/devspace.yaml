version: v2beta1

vars:
  PLATFORM_NAMESPACE: platform

deployments:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    helm:
      releaseName: platform-server
      chart:
        path: ../../charts/platform-server
      values:
        image:
          repository: ghcr.io/agynio/platform-server
          tag: dev
          pullPolicy: IfNotPresent

dev:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: platform-server
      app.kubernetes.io/instance: platform-server
    containers:
      platform-server:
        container: platform-server
        workingDir: /opt/app
        command:
          - sh
        args:
          - -c
          - |
            pnpm install --filter @agyn/platform-server... --recursive --prefer-offline
            pnpm --dir packages/platform-server dev
        sync:
          - path: .:/opt/app/packages/platform-server
            excludePaths:
              - node_modules
              - dist
              - .devspace
              - .git
              - prisma/generated
