version: v2beta1

vars:
  PLATFORM_NAMESPACE: platform

pipelines:
  dev: |-
    create_deployments --sequential platform-server
    start_dev platform-server

deployments:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    helm:
      releaseName: platform-server
      chart:
        path: ../../charts/platform-server
      values:
        env:
          - name: NODE_ENV
            value: production
          - name: PORT
            value: "3010"
          - name: AGENTS_DATABASE_URL
            value: postgresql://agents:agents@platform-db:5432/agents
          - name: LLM_PROVIDER
            value: litellm
          - name: LITELLM_BASE_URL
            value: http://litellm:4000
          - name: LITELLM_MASTER_KEY
            value: sk-dev-master
          - name: LITELLM_SALT_KEY
            value: sk-dev-salt
          - name: OPENAI_BASE_URL
            value: http://litellm:4000/v1
          - name: OPENAI_API_KEY
            value: sk-dev-master
          - name: DOCKER_RUNNER_GRPC_HOST
            value: docker-runner
          - name: DOCKER_RUNNER_GRPC_PORT
            value: "7071"
          - name: DOCKER_RUNNER_SHARED_SECRET
            value: change-me
          - name: DOCKER_RUNNER_OPTIONAL
            value: "true"
          - name: DOCKER_RUNNER_TIMEOUT_MS
            value: "60000"
          - name: DOCKER_RUNNER_CONNECT_RETRY_BASE_DELAY_MS
            value: "1000"
          - name: DOCKER_RUNNER_CONNECT_RETRY_MAX_DELAY_MS
            value: "60000"
          - name: DOCKER_RUNNER_CONNECT_RETRY_JITTER_MS
            value: "500"
          - name: DOCKER_RUNNER_CONNECT_PROBE_INTERVAL_MS
            value: "10000"
          - name: DOCKER_RUNNER_CONNECT_MAX_RETRIES
            value: "120"
          - name: VAULT_ENABLED
            value: "true"
          - name: VAULT_ADDR
            value: http://vault:8200
          - name: VAULT_TOKEN
            value: dev-root
          - name: GRAPH_BRANCH
            value: v0.10.1
          - name: GRAPH_AUTHOR_NAME
            value: Agyn Platform
          - name: GRAPH_AUTHOR_EMAIL
            value: rowan.stein@agyn.io
        image:
          repository: ghcr.io/agynio/platform-server
          tag: dev
          pullPolicy: IfNotPresent
        extraVolumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: data
            mountPath: /opt/app/data
          - name: data
            mountPath: /opt/app/packages/platform-server/data
          - name: data
            mountPath: /data
        extraVolumes:
          - name: tmp
            emptyDir: {}
          - name: data
            emptyDir: {}
        podSecurityContext:
          enabled: true
          fsGroup: 1000
        securityContext:
          enabled: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 500m
            memory: 4Gi
          requests:
            cpu: 100m
            memory: 128Mi

hooks:
  - name: disable-argocd-auto-sync
    command: sh
    args:
      - -lc
      - |
        set -eu
        if kubectl get application platform-server -n argocd >/dev/null 2>&1; then
          kubectl patch application platform-server -n argocd --type merge -p '{"spec":{"syncPolicy":{"automated":null}}}'
        fi
    events:
      - before:deploy:platform-server

dev:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: platform-server
      app.kubernetes.io/instance: platform-server
    containers:
      platform-server:
        container: platform-server
        workingDir: /opt/app/data/workspace
        command:
          - bash
        args:
          - -lc
          - |
            set -euo pipefail
            set -x
            umask 0002
            base="/opt/app/data/workspace"
            if [ -d "$base" ]; then
              rm -rf "$base" || true
            fi
            mkdir -p "$base"
            chmod 2775 "$base" || true
            cd "$base"
            for i in $(seq 1 150); do
              if [ -f "$base/pnpm-workspace.yaml" ]; then
                break
              fi
              echo "Waiting for workspace files to sync..."
              sleep 2
            done
            if [ ! -f "$base/pnpm-workspace.yaml" ]; then
              echo "pnpm-workspace.yaml not found after waiting" >&2
              exit 1
            fi
            mkdir -p "$base/.cache/pnpm" "$base/.cache/npm" "$base/tmp"
            mkdir -p "$base/.pnpm-store" "$base/.corepack"
            chown -R 1000:1000 "$base" || true
            export TMPDIR="$base/tmp"
            export HOME="$base"
            export PNPM_HOME="$base/.cache/pnpm"
            export NPM_CONFIG_CACHE="$base/.cache/npm"
            export PNPM_STORE_PATH="$base/.pnpm-store"
            export PNPM_TMPDIR="$base/tmp"
            export NPM_CONFIG_TMP="$base/tmp"
            export NPM_CONFIG_TMPDIR="$base/tmp"
            export npm_config_tmp="$base/tmp"
            export NPM_CONFIG_PREFIX="$base"
            export npm_config_prefix="$base"
            export COREPACK_HOME="$base/.corepack"
            export PATH="$PNPM_HOME:$PATH"
            export CI=true
            export DEVSPACE_INJECT_SYNC_USE_INOTIFY=true
            export DEVSPACE_USE_INOTIFY=1
            export DEVSPACE_INJECT_USE_INOTIFY=1
            export DEVSPACE_USEINOTIFY=1
            export DEVSPACE_INJECT_USEINOTIFY=1
            if ! npm install pnpm@10.5.0 --prefix "$base/.pnpm-dist"; then
              rm -rf "$base/.pnpm-dist" "$base/.cache/npm"
              npm install pnpm@10.5.0 --prefix "$base/.pnpm-dist"
            fi
            export PATH="$base/.pnpm-dist/node_modules/.bin:$PATH"
            pnpm config set tmp "$base/tmp"
            pnpm config set store-dir "$base/.pnpm-store"
            pnpm config set cache-dir "$base/.cache/pnpm"
            export NODE_OPTIONS="--max-old-space-size=1024"
            if [ ! -f "$base/node_modules/.modules.yaml" ]; then
              pnpm install --recursive --prefer-offline --filter @agyn/platform-server... --child-concurrency=1 --network-concurrency=1 \
                || pnpm install --recursive --filter @agyn/platform-server... --child-concurrency=1 --network-concurrency=1
            fi
            pnpm --filter @agyn/platform-server dev
        sync:
          - path: ../..:/opt/app/data/workspace
            excludePaths:
              - node_modules
              - dist
              - .git
              - packages/platform-server/node_modules
              - packages/platform-server/dist
              - .pnpm-store
              - .cache
