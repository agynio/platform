version: v2beta1

vars:
  PLATFORM_NAMESPACE: platform
  ARGOCD_NAMESPACE: argocd
  ARGOCD_APPLICATION: platform-server

pipelines:
  dev:
    run: |-
      run "kubectl -n ${ARGOCD_NAMESPACE} patch application ${ARGOCD_APPLICATION} --type merge -p '{\"spec\":{\"syncPolicy\":{\"automated\":null}}}'"
      start_dev

hooks:
  - command: kubectl -n ${ARGOCD_NAMESPACE} patch application ${ARGOCD_APPLICATION} --type merge -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true,"allowEmpty":false}}}}'
    events:
      - after:dev

dev:
  platform-server:
    namespace: ${PLATFORM_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: platform-server
      app.kubernetes.io/instance: platform-server
    patches:
      - op: replace
        path: spec.containers[0].securityContext.readOnlyRootFilesystem
        value: false
      - op: replace
        path: spec.containers[0].resources.limits.memory
        value: 4Gi
    containers:
      platform-server:
        container: platform-server
        devImage: ghcr.io/agynio/platform-server:dev
        workingDir: /opt/app/data/workspace
        command:
          - sh
        args:
          - -c
          - |-
            while [ ! -f /opt/app/data/workspace/package.json ]; do
              echo "Waiting for sources to sync..."
              sleep 1
            done
            cd /opt/app/data/workspace
            pnpm proto:generate
            pnpm approve-builds @prisma/client prisma esbuild @nestjs/core
            pnpm install --filter @agyn/platform-server... --frozen-lockfile
            cd /opt/app/data/workspace/packages/platform-server
            pnpm exec prisma generate
            pnpm dev
        sync:
          - path: ../..:/opt/app/data/workspace
            excludePaths:
              - node_modules
              - dist
              - .git
              - .devspace
              - packages/platform-server/node_modules
              - packages/platform-server/dist
              - packages/platform-server/prisma/generated
        ports:
          - port: 3010
