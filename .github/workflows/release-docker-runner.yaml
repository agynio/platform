name: Release docker-runner

on:
  push:
    tags:
      - "docker-runner-v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/agynio/docker-runner
  CHART_DIR: charts/docker-runner
  HELM_REGISTRY: oci://ghcr.io/agynio/charts
  DOCKERFILE: packages/docker-runner/Dockerfile

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: vars
        run: |
          if [[ "${GITHUB_REF_NAME}" != docker-runner-v* ]]; then
            echo "Tag must start with docker-runner-v" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#docker-runner-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (Docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR (Helm)
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Build chart dependencies
        working-directory: ${{ env.CHART_DIR }}
        run: helm dependency build

      - name: Lint chart
        run: helm lint ${{ env.CHART_DIR }}

      - name: Package chart
        run: |
          mkdir -p dist
          helm package ${{ env.CHART_DIR }} \
            --destination dist \
            --version ${{ steps.vars.outputs.version }} \
            --app-version ${{ steps.vars.outputs.version }}

      - name: Push chart to GHCR
        run: |
          helm push dist/docker-runner-${{ steps.vars.outputs.version }}.tgz ${{ env.HELM_REGISTRY }}
